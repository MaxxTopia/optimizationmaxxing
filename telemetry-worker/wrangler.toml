name = "optmaxxing-telemetry"
main = "worker.js"
compatibility_date = "2025-01-01"

# KV namespace for the anonymous opt-in event log. Created via:
#   wrangler kv namespace create telemetry-events
# Then paste the returned id below + run `wrangler deploy`.
[[kv_namespaces]]
binding = "TELEMETRY"
id = "5ed2079ad74b458fadb5a2b9c60d10c9"

# Per-IP rate-limit ledger (1 /event per 60s). Without this, anyone
# can DoS our 1K-writes-per-day KV free-tier budget. Worker degrades
# to no-rate-limit if the binding is missing.
[[kv_namespaces]]
binding = "TELEMETRY_RATELIMIT"
id = "8019f4c25394446c85fd3286a97bcd07"

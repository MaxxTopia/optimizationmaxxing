<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!--
    Dropmaxxer rail icon — a MAP/LANDING PIN with a dotted drop trajectory
    arcing into it. Deliberately NOT a scope/crosshair (that read too close to
    snipemaxxer's reticle). Indigo -> cyan = dropmaxxer canon accent.
  -->
  <defs>
    <linearGradient id="dm-pin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6a6ff9"/>
      <stop offset="55%"  stop-color="#4c51f7"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- Dotted drop trajectory descending into the pin from upper-left -->
  <path d="M2.8 2.8 Q 6 10 12.4 8.2"
        fill="none" stroke="#00d4ff" stroke-width="1.5"
        stroke-linecap="round" stroke-dasharray="0.1 2.7" opacity="0.95"/>

  <!-- Map / landing pin -->
  <path d="M13 21.6 C 13 21.6 6.3 13.9 6.3 9.5 A 6.7 6.7 0 1 1 19.7 9.5 C 19.7 13.9 13 21.6 13 21.6 Z"
        fill="url(#dm-pin)"/>

  <!-- Landing-point marker (white ring + accent core) -->
  <circle cx="13" cy="9.4" r="2.35" fill="#ffffff"/>
  <circle cx="13" cy="9.4" r="1.05" fill="#4c51f7"/>
</svg>

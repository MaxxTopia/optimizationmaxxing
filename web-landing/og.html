<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>optimizationmaxxing OG card (1200x630)</title>
<style>
  /*
   * Renders the Open Graph preview card. og.png was generated 2026-05-07 by
   * navigating to this file in Puppeteer at 1200x630 and screenshotting.
   * Re-generate any time stat numbers change:
   *   await page.setViewport({ width: 1200, height: 630 })
   *   await page.goto('file:///.../og.html')
   *   await page.screenshot({ path: 'og.png', omitBackground: false })
   * Or via Chrome devtools: F12 → toolbar device dropdown → 1200x630 →
   * Cmd/Ctrl+Shift+P → "Capture full size screenshot".
   */
  @font-face { font-family: 'Inter'; src: local('Inter'), local('Segoe UI'); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #ece8e1;
    background: #0d1418;
  }
  .card {
    width: 1200px; height: 630px;
    position: relative;
    background:
      radial-gradient(circle at 18% 25%, #ff4655 0%, transparent 38%),
      radial-gradient(circle at 82% 75%, #0f1923 0%, transparent 50%),
      #0d1418;
    padding: 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(13, 20, 24, 0.35);
    backdrop-filter: blur(40px);
    z-index: 0;
  }
  .content { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; gap: 36px; }
  .eyebrow {
    font-size: 18px; letter-spacing: 0.25em;
    text-transform: uppercase; color: #8e8579;
  }
  h1 {
    font-size: 96px; font-weight: 800; line-height: 1; letter-spacing: -0.025em;
    max-width: 1000px;
  }
  .accent { color: #ff4655; }
  .lede {
    font-size: 26px; line-height: 1.4; color: #c8b89a; max-width: 900px;
  }
  footer {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-top: auto;
  }
  .brand { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .brand .dot { color: #ff4655; }
  .stats { display: flex; gap: 48px; }
  .stat { display: flex; flex-direction: column; }
  .stat .num { font-size: 42px; font-weight: 800; color: #ff4655; line-height: 1; }
  .stat .label { font-size: 14px; color: #8e8579; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 6px; }
</style>
</head>
<body>
<div class="card">
  <div class="content">
    <div class="eyebrow">optimizationmaxxing · v0.1</div>
    <h1>Max FPS.<br/><span class="accent">Zero input lag.</span></h1>
    <p class="lede">Spec-aware Windows tweaks for competitive gamers. Every change is undo-safe. 3.88 MB installer.</p>
    <footer>
      <span class="brand">optmaxxing<span class="dot">.</span></span>
      <div class="stats">
        <div class="stat"><span class="num">90</span><span class="label">Curated tweaks</span></div>
        <div class="stat"><span class="num">13</span><span class="label">Presets</span></div>
        <div class="stat"><span class="num">3.88 MB</span><span class="label">Installer</span></div>
      </div>
    </footer>
  </div>
</div>
</body>
</html>
